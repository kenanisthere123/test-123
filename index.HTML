<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatik Grundwissen Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .quiz-container {
            width: 100%;
            max-width: 500px;
            background: #161b22;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-grid {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: 0.2s;
        }

        .answer-btn {
            background: #238636;
            color: white;
        }

        .answer-btn:hover {
            background: #2ea043;
        }

        .correct {
            background: #2ea043 !important;
        }

        .wrong {
            background: #da3633 !important;
        }

        .next-btn {
            margin-top: 20px;
            background: #0969da;
            color: white;
            display: none;
        }

        .result {
            margin-top: 20px;
            font-size: 1.2em;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="quiz-container">
        <h1>Informatik Grundwissen Quiz</h1>

        <div id="question-container">
            <h2 id="question"></h2>
            <div id="answer-buttons" class="btn-grid"></div>
        </div>

        <button id="next-btn" class="next-btn">Weiter</button>
        <div id="result" class="result"></div>
    </div>

    <script>
        const questions = [
            {
                question: "Was bedeutet die Abkürzung CPU?",
                answers: [
                    { text: "Central Processing Unit", correct: true },
                    { text: "Computer Power Unit", correct: false },
                    { text: "Central Program Utility", correct: false },
                    { text: "Control Processing User", correct: false }
                ]
            },
            {
                question: "Welche Zahlensysteme nutzt ein Computer intern?",
                answers: [
                    { text: "Binärsystem", correct: true },
                    { text: "Dezimalsystem", correct: false },
                    { text: "Hexadezimalsystem", correct: false },
                    { text: "Oktalsystem", correct: false }
                ]
            },
            {
                question: "Was ist ein Algorithmus?",
                answers: [
                    { text: "Eine Schritt-für-Schritt-Anleitung zur Problemlösung", correct: true },
                    { text: "Ein Computerprogramm", correct: false },
                    { text: "Ein Hardware-Bauteil", correct: false },
                    { text: "Ein Datentyp", correct: false }
                ]
            }
        ];

        const questionElement = document.getElementById("question");
        const answerButtons = document.getElementById("answer-buttons");
        const nextButton = document.getElementById("next-btn");
        const resultElement = document.getElementById("result");

        let currentQuestionIndex = 0;
        let score = 0;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            shuffle(questions);
            nextButton.style.display = "none";
            resultElement.innerHTML = "";
            showQuestion();
        }

        function showQuestion() {
            resetState();
            let currentQuestion = questions[currentQuestionIndex];
            questionElement.innerText = currentQuestion.question;

            shuffle(currentQuestion.answers).forEach(answer => {
                const button = document.createElement("button");
                button.innerText = answer.text;
                button.classList.add("answer-btn");
                button.addEventListener("click", () => selectAnswer(button, answer));
                answerButtons.appendChild(button);
            });
        }

        function resetState() {
            nextButton.style.display = "none";
            answerButtons.innerHTML = "";
        }

        function selectAnswer(button, answer) {
            const buttons = answerButtons.querySelectorAll("button");
            buttons.forEach(btn => btn.disabled = true);

            if (answer.correct) {
                button.classList.add("correct");
                score++;
            } else {
                button.classList.add("wrong");
            }

            nextButton.style.display = "block";
        }

        nextButton.addEventListener("click", () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        });

        function showResult() {
            resetState();
            questionElement.innerText = "Quiz beendet!";
            resultElement.innerHTML = `🎉 Du hast <strong>${score}</strong> von <strong>${questions.length}</strong> Fragen richtig beantwortet.`;
        }

        startQuiz();
    </script>
</body>
</html>
